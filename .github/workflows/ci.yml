name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          node-version: '20.x'

      - name: Check Node.js, npm and package manager versions
        run: |
          node --version
          npm --version
          cat package.json | grep 'packageManager' || echo 'No packageManager field'
          cat package.json | grep 'engines' || echo 'No engines field'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --ci --runInBand --coverage

      - name: Run e2e tests
        run: npm run test:e2e -- --ci --runInBand
